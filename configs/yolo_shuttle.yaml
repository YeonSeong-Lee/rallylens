# Ultralytics training config for shuttlecock fine-tuning.
#
# Usage (from the project root, inside Colab with GPU):
#   yolo detect train \
#       model=yolo11n.pt \
#       data=configs/yolo_shuttle_data.yaml \
#       cfg=configs/yolo_shuttle.yaml \
#       project=runs/shuttle \
#       name=finetune_v1
#
# Why these choices:
# - mosaic=0.0: shuttlecocks are 10-30 px; Mosaic often crops them out entirely
#   and teaches the model that small objects vanish. Hard-disable.
# - imgsz=1280: small-object recall scales with input resolution. 1280 is the
#   sweet spot for T4 16GB VRAM at yolo11n.
# - epochs=50 with save_period=1: Colab sessions drop. Per-epoch checkpoint
#   means we can always resume from the latest.
# - seed=42: matches .env.example and README reproducibility claim.
# - patience=15: early stop if val mAP plateaus.
# - Augmentation trimmed: flipud=0 (shuttles have vertical motion semantics),
#   degrees=0 (broadcast camera is gravity-aligned).

epochs: 50
imgsz: 1280
batch: 16            # reduce to 8 if Colab OOMs
seed: 42
patience: 15
save_period: 1       # epoch checkpoints — Colab session resilience
cos_lr: true
optimizer: AdamW
lr0: 0.001
lrf: 0.01
weight_decay: 0.0005

# Augmentation
mosaic: 0.0          # CRITICAL: off for small objects
mixup: 0.0
copy_paste: 0.0
degrees: 0.0
flipud: 0.0
fliplr: 0.5
hsv_h: 0.015
hsv_s: 0.5
hsv_v: 0.3
translate: 0.05
scale: 0.3
erasing: 0.0

# Loss weights
box: 7.5
cls: 0.5
dfl: 1.5

# Runtime
amp: true
workers: 4
plots: true
